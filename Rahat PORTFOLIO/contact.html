    <h1>Contact Me</h1>
    <!-- Simple Registration Form -->
    <form method="post">

        <fieldset>
            <legend>Registration Form</legend>

            <label for="name">First name:</label>
            <input type="text" id="First name" placeholder="Enter your first name" First name="First name" required><br><br>

             <label for="name">Last name:</label>
            <input type="text" id="Last name" placeholder="Enter your last name" Last name="Last name" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email" name="email" required><br><br>

            <label>Gender:</label><br><br>
            <input type="radio" name="gender" value="male"> Male<br><br>
            <input type="radio" name="gender" value="female"> Female<br><br>

             <label for="name">Company:</label>
            <input type="text" id="Company" placeholder="Enter your company name" Company="Company" required><br><br>

             <label>Reason for contact:</label><br><br>
            <input type="radio" name="Reason for contact" value="Web development"> Web development<br><br>
            <input type="radio" name="Reason for contact" value="Mobile development"> Mobile development<br><br>
            <input type="radio" name="Reason for contact" value="AI/ML development"> AI/ML development<br><br>

             <label>Topics:</label><br><br>
            <input type="radio" name="Topics" value="Projects"> Projects<br><br>
            <input type="radio" name="Topics" value="Thesis"> Thesis<br><br>
            <input type="radio" name="Topics" value="Job"> Job<br><br>

            <label for="Consultation date">Consultation date:</label>
            <input type="date" id="Consultation date" placeholder="Enter your consultation date" name="" required><br><br>


               

            <input type="submit" value="Submit">
            <input type="reset">

        </fieldset>

    </form><br>
